name: "📋 BDD 스토리"
description: "BDD 시나리오 기반 기능 요청 — Copilot이 구현합니다"
title: "[Story] "
labels: ["story"]
body:
  - type: markdown
    attributes:
      value: |
        ## BDD 스토리 작성 가이드
        Given/When/Then 형식으로 시나리오를 작성하세요.
        Copilot에게 할당하면 자동으로 구현됩니다.

  - type: textarea
    id: overview
    attributes:
      label: "개요"
      description: "이 스토리가 해결하는 문제를 설명하세요"
    validations:
      required: true

  - type: textarea
    id: scenarios
    attributes:
      label: "BDD 시나리오"
      description: "Given/When/Then 형식으로 작성하세요"
      value: |
        Feature: [기능 이름]

          Scenario: [시나리오 1]
            Given [사전 조건]
            When [사용자 행동]
            Then [기대 결과]
    validations:
      required: true

  - type: textarea
    id: requirements
    attributes:
      label: "요구사항"
      description: "기술적 요구사항, 제약 조건 등"
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: "인수 조건"
      description: "완료 판단 기준"
