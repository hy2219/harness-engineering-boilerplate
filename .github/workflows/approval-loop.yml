name: Approval Loop — Close self-heal cycle

on:
  pull_request:
    types: [closed]

jobs:
  close-heal-cycle:
    if: github.event.pull_request.merged == true && contains(github.event.pull_request.title, '[Self-Heal]')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write

    steps:
      - name: Resolve self-heal Issue and update log
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const prNumber = pr.number;
            const prBody = pr.body || '';
            const prTitle = pr.title;

            // PR 본문에서 Issue 번호 추출
            const issueMatch = prBody.match(/(?:closes|fixes|resolves)\s+#(\d+)/i)
              || prTitle.match(/#(\d+)/);

            if (!issueMatch) {
              console.log('연결된 Issue 번호를 찾을 수 없습니다.');
              return;
            }
            const issueNumber = parseInt(issueMatch[1]);

            // Issue가 self-heal 라벨인지 확인
            const issue = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
            });
            const labels = issue.data.labels.map(l => l.name || l);
            if (!labels.includes('self-heal')) {
              console.log(`Issue #${issueNumber}은 self-heal 라벨이 없습니다.`);
              return;
            }

            const descSummary = prBody.length > 500
              ? prBody.slice(0, 500) + '...'
              : prBody || '(설명 없음)';

            // Issue에 완료 코멘트
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: [
                `✅ 수정 PR #${prNumber}이 머지되었습니다.`,
                ``,
                `### 수정 내역`,
                descSummary,
                ``,
                `### 향후 대응`,
                `이 패턴의 문제가 다시 발생하면 동일한 방식으로 자동 수정됩니다.`,
                `다른 방식으로 대응하길 원하시면 이 Issue에 코멘트를 남겨주세요.`,
              ].join('\n'),
            });

            // Issue 닫기
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              state: 'closed',
              state_reason: 'completed',
            });
            console.log(`Issue #${issueNumber} 닫힘`);

            // docs/self-heal-log.md 상태 업데이트
            const filePath = 'docs/self-heal-log.md';
            try {
              const file = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: filePath,
              });
              let content = Buffer.from(file.data.content, 'base64').toString('utf8');

              const pattern = new RegExp(
                `(\\|[^|]*\\|[^|]*\\|[^|]*#${issueNumber}[^|]*\\|[^|]*\\|)\\s*pending\\s*\\|`,
                'g'
              );
              const updated = content.replace(pattern, '$1 resolved |');

              if (updated !== content) {
                await github.rest.repos.createOrUpdateFileContents({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  path: filePath,
                  message: `docs: self-heal 이력 상태 업데이트 — Issue #${issueNumber} resolved`,
                  content: Buffer.from(updated).toString('base64'),
                  sha: file.data.sha,
                });
                console.log('Self-heal log 상태 업데이트 완료');
              }
            } catch (e) {
              console.log(`self-heal-log.md 업데이트 실패: ${e.message}`);
            }
