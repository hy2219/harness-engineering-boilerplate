name: Slack Notify

on:
  pull_request:
    types: [opened, ready_for_review]
  workflow_run:
    workflows:
      - "CI — Test & Lint"
      - "CD — Deploy to Azure"
      - "Infra — Provision Azure Resources"
    types: [completed]

jobs:
  notify-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Notify PR created
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        if: env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "📬 새 PR: #${{ github.event.pull_request.number }} ${{ github.event.pull_request.title }}\n${{ github.event.pull_request.html_url }}\n작성자: ${{ github.event.pull_request.user.login }}"
            }

  notify-workflow:
    if: github.event_name == 'workflow_run'
    runs-on: ubuntu-latest
    steps:
      - name: Notify workflow result
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        if: env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "${{ github.event.workflow_run.conclusion == 'success' && '✅' || '❌' }} ${{ github.event.workflow_run.name }}: ${{ github.event.workflow_run.conclusion }}\n${{ github.event.workflow_run.html_url }}"
            }
